name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-14   # Apple Silicon — cross-compiles x64 via macOS toolchain

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate icons
        run: npm run icons

      - name: Package arm64
        run: |
          npx electron-rebuild -f -a arm64 -w better-sqlite3
          npx electron-builder --mac --arm64 --publish never

      - name: Package x64
        run: |
          npx electron-rebuild -f -a x64 -w better-sqlite3
          npx electron-builder --mac --x64 --publish never

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
